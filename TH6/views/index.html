<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Node.js Learning Hub</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --card: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .container { background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); width: 100%; max-width: 600px; }
        h1 { color: var(--primary); margin-top: 0; font-size: 28px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        p { font-size: 16px; line-height: 1.6; color: #475569; }
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .menu a { text-align: center; text-decoration: none; color: var(--primary); font-weight: 600; padding: 12px; border-radius: 8px; background: #eff6ff; border: 1px solid #bfdbfe; transition: all 0.2s ease; }
        .menu a:hover { background: var(--primary); color: white; transform: translateY(-3px); box-shadow: 0 4px 12px rgb(37 99 235 / 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Node.js Learning Hub</h1>
        <p>Chào mừng bạn đến với hệ thống máy chủ Node.js Thuần. Hãy chọn một chức năng bên dưới để kiểm tra hệ thống:</p>
        <div class="menu">
            <a href="/">🏠 Trang chủ</a>
            <a href="/events">🔔 Test Sự kiện (Events)</a>
            <a href="/request">🌐 Test Request Info</a>
            <a href="/streams">🌊 Test Streams</a>
            <a href="/json">📦 Test API JSON</a>
        </div>
    </div>
</body>
</html>
